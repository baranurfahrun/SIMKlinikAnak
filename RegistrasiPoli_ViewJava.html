<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Registrasi Poli - SIMKlinik Java Web</title>
    <!-- CSS TETAP PAKAI TAILWIND/VANILLA YANG ESTETIK BERWARNA BIRU LEMBUT -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0, 50, 150, 0.1);
        }
    </style>
</head>
<body class="bg-sky-50 font-sans text-slate-700 min-h-screen p-8">

    <div className="max-w-6xl mx-auto space-y-6">
        <!-- HEADER FORM (BIRU LEMBUT ALA SS KAMU) -->
        <div class="glass-card p-10">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 bg-sky-500 rounded-2xl flex items-center justify-center text-white shadow-xl">
                    <i class="fas fa-file-invoice text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tight italic">Registrasi Periksa Baru</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Lengkapi data kunjungan pasien hari ini</p>
                </div>
            </div>

            <!-- FORM INPUTAN (TATA LETAK PERSIS SS KAMU) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase text-slate-400">Pilih Dokter Dituju</label>
                    <div class="relative group">
                        <select id="dokter" class="w-full bg-white/60 border border-slate-100 rounded-2xl py-3 px-4 text-xs font-bold text-slate-700 focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 transition-all outline-none">
                            <option value="dr1">dr. Muqi</option>
                            <option value="dr2">dr. Siska, Sp.A</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-300 pointer-events-none"></i>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase text-slate-400">Poliklinik</label>
                    <input type="text" value="Poliklinik Anak" readonly class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 px-4 text-xs font-bold text-slate-500">
                </div>
            </div>

            <!-- TOMBOL SIMPAN (BIRU MENTERENG ALAS SS KAMU) -->
            <div class="mt-10 flex justify-end">
                <button onclick="simpanKeJava()" class="bg-sky-500 hover:bg-sky-600 text-white px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-xl shadow-sky-100 flex items-center gap-2">
                    <i class="fas fa-save"></i> SIMPAN & CEK TTV (DIPROSES JAVA)
                </button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT: JEMBATAN MENUJU SERVER JAVA SPRING BOOT -->
    <script>
        function simpanKeJava() {
            // Animasi Loading
            console.log("MENGIRIM DATA KE JAVA WEB SERVER...");
            
            // LOGIKA: Kirim data lewat FETCH (Ajax) ke endpoint Java (Controller)
            // fetch('/registrasi/simpan', { method: 'POST', body: ... })
            
            alert("🤜💥🤛 Mantap Bro! Data sedang diproses oleh Mesin Java Spring Boot kamu yang super tangguh!");
        }
    </script>
</body>
</html>
